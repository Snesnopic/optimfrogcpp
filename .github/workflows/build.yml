name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x64 GCC
            os: ubuntu-latest
            asset_name: ofrdecomp-linux-x64-gcc

          - name: Ubuntu x64 Clang
            os: ubuntu-latest
            compiler_c: clang
            compiler_cxx: clang++
            asset_name: ofrdecomp-linux-x64-clang

          - name: Ubuntu ARM64 GCC
            os: ubuntu-24.04-arm
            asset_name: ofrdecomp-linux-arm64

          - name: macOS Intel
            os: macos-15-intel
            asset_name: ofrdecomp-darwin-x64

          - name: macOS ARM64
            os: macos-14
            asset_name: ofrdecomp-darwin-arm64

          - name: Windows x64
            os: windows-latest
            asset_name: ofrdecomp-windows-x64

          - name: Windows ARM64
            os: windows-latest
            cmake_args: -A ARM64
            asset_name: ofrdecomp-windows-arm64
            skip_sanity_check: true   # cross-compiled; host runner can't execute ARM64 binaries

    steps:
      - uses: actions/checkout@v7

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}
        env:
          CC: ${{ matrix.compiler_c }}
          CXX: ${{ matrix.compiler_cxx }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Decode sanity check (sine_mono / test_stereo, MD5 known-good)
        if: '!matrix.skip_sanity_check'
        shell: bash
        run: |
          bin=build/ofrdecomp
          [ -f "build/Release/ofrdecomp.exe" ] && bin=build/Release/ofrdecomp.exe
          [ -f "build/ofrdecomp.exe" ] && bin=build/ofrdecomp.exe
          check() { # ofr_file expected_md5
            "$bin" "$1"
            got=$(python3 -c "import hashlib;print(hashlib.md5(open('test.raw','rb').read()).hexdigest())")
            [ "$got" = "$2" ] || { echo "MD5 mismatch for $1: got $got want $2"; exit 1; }
          }
          check tests/sine_mono.ofr 4c820520d7faa9b2e11c76e9c4d2d7c7
          check tests/test_stereo.ofr 63c303b47bda85ba2a0029f71cfba1d5

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: |
            build/ofrdecomp
            build/ofrenc
            build/ofr
            build/Release/ofrdecomp.exe
            build/Release/ofrenc.exe
            build/Release/ofr.exe
